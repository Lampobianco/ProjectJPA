spring.application.name=ProjectJPA

logging.level.root=info
logging.level.com.betacom=debug
logging.pattern.console=  %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n
logging.file=./target/jpa.log

# Imposta queste variabili d'ambiente sul tuo sistema oppure crea
# src/main/resources/application-local.properties con i valori reali:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/db_jpa_05_2026
#   spring.datasource.username=<tuo_username>
#   spring.datasource.password=<tua_password>
# Avvia con profilo: -Dspring.profiles.active=local
spring.datasource.url=${db_url}
spring.datasource.username=${db_username}
spring.datasource.password=${db_pwd}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.schema-generation.script.append=false
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=update
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=update
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=target/define.sql
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.drop-target=target/drop.sql